<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="History prompt invoice - Invoice AI Designer Sewaalkes.com">
<title>History Prompt | Sewaalkes.com</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/mobile.css">
</head>
<body>

<div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-icon"><i class="fa fa-heartbeat"></i></div>
            <h2>Sewaalkes</h2>
            <span>Invoice AI Designer</span>
        </div>
        <nav>
            <a href="index.html" id="nav-dashboard">
                <i class="fa fa-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="index.html" id="nav-new">
                <i class="fa fa-file-invoice"></i>
                <span>New Invoice</span>
            </a>
            <a href="history.html" class="active" id="nav-history">
                <i class="fa fa-clock-rotate-left"></i>
                <span>History</span>
            </a>
            <a href="settings.html" id="nav-settings">
                <i class="fa fa-gear"></i>
                <span>Settings</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <p>Invoice AI Designer V1</p>
            <p class="brand-tag">by Sewaalkes.com</p>
        </div>
    </aside>

    <!-- CONTENT -->
    <main class="main history-page">

        <div class="topbar">
            <div class="topbar-left">
                <h1><i class="fa fa-clock-rotate-left" style="color:#3b82f6;font-size:22px;margin-right:10px;"></i>History Prompt</h1>
                <p class="topbar-sub">Riwayat semua prompt invoice yang pernah dibuat</p>
            </div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;">
                <button onclick="window.location.href='index.html'" class="btn-primary">
                    <i class="fa fa-plus"></i> Buat Invoice Baru
                </button>
                <button onclick="clearHistory()" class="btn-delete" style="padding:11px 18px;border-radius:10px;font-size:14px;">
                    <i class="fa fa-trash"></i> Hapus Semua
                </button>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <i class="fa fa-list"></i>
                <h3>Daftar History</h3>
                <span id="historyCount" style="background:#eff6ff;color:#1d4ed8;font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px;margin-left:auto;"></span>
            </div>
            <div id="historyContainer"></div>
        </div>

    </main>
</div>

<script>
function loadHistory() {
    const container = document.getElementById("historyContainer");
    const countEl = document.getElementById("historyCount");
    const history = JSON.parse(localStorage.getItem("invoiceHistory") || "[]");

    countEl.textContent = `${history.length} prompt`;

    if (history.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <i class="fa fa-clock-rotate-left"></i>
                <p>Belum ada history prompt</p>
                <p style="font-size:13px;margin-top:6px;color:#9ca3af;">Buat invoice baru dan klik "Generate Prompt"</p>
            </div>
        `;
        return;
    }

    let html = "";
    history.forEach((item, index) => {
        html += `
        <div class="history-item">
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
                <div>
                    <h4><i class="fa fa-file-lines" style="margin-right:6px;"></i>Prompt #${index + 1}</h4>
                    <small><i class="fa fa-calendar" style="margin-right:4px;"></i>${item.date}</small>
                </div>
                <button onclick="copyPrompt(${index})" class="btn-primary" style="font-size:12px;padding:8px 14px;">
                    <i class="fa fa-copy"></i> Copy
                </button>
            </div>
            <textarea rows="6" readonly>${item.prompt}</textarea>
        </div>
        `;
    });

    container.innerHTML = html;
}

function copyPrompt(index) {
    const history = JSON.parse(localStorage.getItem("invoiceHistory") || "[]");
    navigator.clipboard.writeText(history[index].prompt).then(() => {
        // Visual feedback
        const btns = document.querySelectorAll(".btn-primary");
        if (btns[index]) {
            btns[index].innerHTML = '<i class="fa fa-check"></i> Berhasil!';
            btns[index].style.background = '#16a34a';
            setTimeout(() => {
                btns[index].innerHTML = '<i class="fa fa-copy"></i> Copy';
                btns[index].style.background = '';
            }, 2000);
        }
    }).catch(() => {
        alert("Prompt #" + (index + 1) + " berhasil dicopy");
    });
}

function clearHistory() {
    if (confirm("Hapus semua history prompt? Tindakan ini tidak bisa dibatalkan.")) {
        localStorage.removeItem("invoiceHistory");
        loadHistory();
    }
}

loadHistory();
</script>

</body>
</html>
