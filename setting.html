<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<header class="hero">

<h1>Settings</h1>

<p>Invoice AI Designer</p>

</header>

<section class="card">

<button onclick="window.location.href='index.html'">
← Dashboard
</button>

<button onclick="saveSettings()">
💾 Simpan Settings
</button>

</section>

<section class="card">

<h2>Profil Perusahaan</h2>

<label>Nama Perusahaan</label>

<input
id="companyName"
type="text"
value="Sewaalkes.com">

<label>Website</label>

<input
id="website"
type="text"
value="www.sewaalkes.com">

<label>Email</label>

<input
id="email"
type="text"
value="info@sewaalkes.com">

<label>Nomor WhatsApp</label>

<input
id="phone"
type="text"
value="081212345678">

<label>Alamat</label>

<textarea
id="companyAddress"
rows="4">
Jl. Kesehatan No.10 Bogor Jawa Barat
</textarea>

</section>

<section class="card">

<h2>Default Invoice</h2>

<label>Template Default</label>

<select id="templateStyle">

<option>
Premium Corporate
</option>

<option>
Medical Blue
</option>

<option>
Executive
</option>

<option>
Modern Clean
</option>

</select>

<label>Status Pembayaran Default</label>

<select id="paymentStatus">

<option>
LUNAS
</option>

<option>
BELUM LUNAS
</option>

<option>
DP
</option>

</select>

</section>

<section class="card">

<h2>Branding</h2>

<p>

Versi saat ini:

<strong>
Invoice AI Designer V1
</strong>

</p>

<p>

Brand:

<strong>
Sewaalkes.com
</strong>

</p>

</section>

</div>

<script>

function saveSettings(){

const settings = {

companyName:
document.getElementById(
"companyName"
).value,

website:
document.getElementById(
"website"
).value,

email:
document.getElementById(
"email"
).value,

phone:
document.getElementById(
"phone"
).value,

companyAddress:
document.getElementById(
"companyAddress"
).value,

templateStyle:
document.getElementById(
"templateStyle"
).value,

paymentStatus:
document.getElementById(
"paymentStatus"
).value

};

localStorage.setItem(
"invoiceSettings",
JSON.stringify(settings)
);

alert(
"Settings berhasil disimpan"
);

}

function loadSettings(){

const settings =
JSON.parse(
localStorage.getItem(
"invoiceSettings"
) || "{}"
);

if(!settings.companyName)
return;

document.getElementById(
"companyName"
).value =
settings.companyName;

document.getElementById(
"website"
).value =
settings.website;

document.getElementById(
"email"
).value =
settings.email;

document.getElementById(
"phone"
).value =
settings.phone;

document.getElementById(
"companyAddress"
).value =
settings.companyAddress;

document.getElementById(
"templateStyle"
).value =
settings.templateStyle;

document.getElementById(
"paymentStatus"
).value =
settings.paymentStatus;

}

loadSettings();

</script>

</body>
</html>
